name: Test and Auto PR (test)

on:
  push:
    branches: [ "test" ]
    paths:
      - 'docker/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          load: true
          tags: test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container for testing
        run: |
          mkdir -p workspace
          docker run -d \
            --name test-container \
            --read-only \
            --tmpfs /tmp:exec \
            -e LOG=on \
            -v $(pwd)/workspace:/home \
            -p 3000:3000 \
            test-image:latest

      - name: Wait for HEALTHCHECK to pass
        run: |
          echo "Waiting for container to become healthy..."
          for i in {1..12}; do
            STATUS=$(docker inspect --format="{{json .State.Health.Status}}" test-container)
            echo "Current status: $STATUS"
            if [ "$STATUS" = "\"healthy\"" ]; then
              echo "Container is healthy!"
              exit 0
            fi
            docker logs test-container
            sleep 5
          done
          echo "Container failed to become healthy in time."
          docker logs test-container
          exit 1

      - name: Check logs for critical errors
        run: |
          echo "Checking container logs..."
          docker logs test-container > container.log
          
          if grep -iE "FATAL|exited: .* \(exit status [^0]" container.log; then
            echo "CRITICAL ERROR FOUND IN LOGS:"
            grep -iE "FATAL|exited: .* \(exit status[^0]" container.log
            echo "--- Full Logs ---"
            cat container.log
            exit 1
          fi
          echo "No critical errors found. Tests passed!"

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base main --head test --json number --jq 'length')
          
          if [ "$PR_EXISTS" -eq "0" ]; then
            echo "Attempting to create Pull Request..."
            if ! OUTPUT=$(gh pr create \
              --base main \
              --head test \
              --title "Auto PR: Update from test" \
              --body "It has passed the build and container startup tests (health checks and log analysis) on the 'test' branch." 2>&1); then
              
              if echo "$OUTPUT" | grep -q "No commits between"; then
                echo "No commits between main and test. Skipping PR creation."
                exit 0
              else
                echo "Failed to create PR: $OUTPUT"
                exit 1
              fi
            else
              echo "Pull Request created successfully."
            fi
          else
            echo "Pull Request already exists. Skipping creation."
          fi